name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: read

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          # cosign v3 defaults to --new-bundle-format and ignores the
          # --output-signature/--output-certificate flags our .goreleaser.yaml
          # signs block uses, which then fails ("create bundle file: open : no
          # such file or directory"). Pin to the latest v2, which keeps the
          # legacy detached-sig/cert behavior. Revisit when migrating signing
          # to the cosign bundle format.
          cosign-release: 'v2.6.3'
      - uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
      - name: Log in to ghcr.io
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7.2.2
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAP_GITHUB_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
      # GoReleaser produces the per-platform binaries under dist/ but not the
      # Claude Desktop .mcpb bundle (see .goreleaser.yaml). Assemble it from
      # those binaries and attach it to the release the previous step created.
      - name: Assemble Claude Desktop .mcpb bundle
        run: bash packaging/mcpb/build.sh --out dist/kubeleash.mcpb
      - name: Upload .mcpb to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${GITHUB_REF_NAME}" dist/kubeleash.mcpb --clobber

  # Register the server in the official MCP Registry. Gated on goreleaser so the
  # ghcr.io image already exists when the registry pulls it to verify the
  # io.modelcontextprotocol.server.name annotation against server.json's name.
  publish-mcp:
    needs: goreleaser
    runs-on: ubuntu-latest
    permissions:
      id-token: write # GitHub OIDC auth to the MCP Registry (no stored secret)
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher
      - name: Sync server.json version + image tag to the release tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          jq --arg v "$VERSION" \
            '.version = $v | .packages[0].identifier = "ghcr.io/kubeleash/kubeleash:" + $v' \
            server.json > server.tmp && mv server.tmp server.json
      - name: Authenticate to MCP Registry (GitHub OIDC)
        run: ./mcp-publisher login github-oidc
      - name: Publish to MCP Registry
        run: ./mcp-publisher publish
