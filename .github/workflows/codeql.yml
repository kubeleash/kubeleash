name: CodeQL

on:
  # CodeQL code scanning requires GitHub Advanced Security — free for PUBLIC
  # repos, unavailable on this private repo's plan. Manual-only for now; when
  # kubeleash goes public, uncomment the push/pull_request/schedule triggers.
  workflow_dispatch:
  # push:
  #   branches: [main]
  # pull_request:
  #   branches: [main]
  # schedule:
  #   - cron: "27 4 * * 1"

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (Go)
    runs-on: ubuntu-latest
    permissions:
      actions: read # required for CodeQL on private repos
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: github/codeql-action/init@84498526a009a99c875e83ef4821a8ba52de7c22 # codeql-bundle-v2.25.5
        with:
          languages: go
      - uses: github/codeql-action/autobuild@84498526a009a99c875e83ef4821a8ba52de7c22 # codeql-bundle-v2.25.5
      - uses: github/codeql-action/analyze@84498526a009a99c875e83ef4821a8ba52de7c22 # codeql-bundle-v2.25.5
