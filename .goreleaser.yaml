version: 2

project_name: kubeleash

before:
  hooks:
    - go mod tidy

builds:
  - id: kubeleash
    main: ./cmd/kubeleash
    binary: kubeleash
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.Date}}
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]

archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: "checksums.txt"

sboms:
  - artifacts: archive

signs:
  - cmd: cosign
    signature: "${artifact}.sig"
    certificate: "${artifact}.pem"
    args:
      - sign-blob
      - "--output-signature=${signature}"
      - "--output-certificate=${certificate}"
      - "${artifact}"
      - "--yes"
    artifacts: checksum

# dockers_v2 uses buildx to build a multi-arch image + manifest in one step
# (replaces the old dockers + docker_manifests pair). The Dockerfile selects the
# right binary via TARGETOS/TARGETARCH from the per-platform build context.
dockers_v2:
  - id: kubeleash
    ids: [kubeleash]
    images:
      - "ghcr.io/kubeleash/kubeleash"
    tags:
      - "{{ .Version }}"
      - "{{ if not .Prerelease }}latest{{ end }}"
    platforms:
      - linux/amd64
      - linux/arm64
    dockerfile: Dockerfile
    sbom: true
    annotations:
      "org.opencontainers.image.source": "https://github.com/kubeleash/kubeleash"
      "org.opencontainers.image.version": "{{ .Version }}"
      "org.opencontainers.image.licenses": "Apache-2.0"

docker_signs:
  - cmd: cosign
    args: ["sign", "--yes", "${artifact}"]
    artifacts: manifests

# homebrew_casks replaces the deprecated `brews` (Homebrew steers pre-built
# binaries to casks). GoReleaser emits both macOS and Linux entries; casks are
# best-supported on macOS, so Linux users may prefer `go install` / the
# container / a release binary.
homebrew_casks:
  - name: kubeleash
    binaries:
      - kubeleash
    repository:
      owner: kubeleash
      name: homebrew-tap
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    directory: Casks
    homepage: "https://github.com/kubeleash/kubeleash"
    description: "Kubernetes MCP server that keeps AI agents on a leash"
    # macOS quarantines unsigned downloaded binaries; strip it on install so
    # `kubeleash` runs without a Gatekeeper prompt. (We are not notarized.)
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/kubeleash"]
          end

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^chore:"
      - "^test:"
